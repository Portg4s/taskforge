<main class="app-shell">
  <header class="app-header">
    <div>
      <p class="eyebrow">TaskForge</p>
      <h1>Projets et boards</h1>
    </div>
    <button type="button" class="secondary-button" (click)="loadProjects()" [disabled]="loadingProjects()">
      Rafraichir
    </button>
  </header>

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }

  <section class="workspace">
    <app-project-panel
      [projects]="projects()"
      [selectedProject]="selectedProject()"
      [loading]="loadingProjects()"
      [saving]="savingProject()"
      (refresh)="loadProjects()"
      (projectCreate)="createProject($event)"
      (projectSelect)="selectProject($event)"
    />

    <app-board-panel
      [selectedProject]="selectedProject()"
      [boards]="boards()"
      [selectedBoard]="selectedBoard()"
      [loading]="loadingBoards()"
      [saving]="savingBoard()"
      (boardCreate)="createBoard($event)"
      (boardSelect)="selectBoard($event)"
    />

    <app-board-columns
      [selectedBoard]="selectedBoard()"
      [columns]="columns()"
      [tasks]="tasks()"
      [loadingColumns]="loadingColumns()"
      [loadingTasks]="loadingTasks()"
      [savingTaskColumnId]="savingTaskColumnId()"
      [movingTaskId]="movingTaskId()"
      [deletingTaskId]="deletingTaskId()"
      (taskCreate)="createTask($event)"
      (taskMove)="moveTask($event)"
      (taskDelete)="deleteTask($event)"
    />
  </section>
</main>
