<article class="task-card">
  <div class="task-header">
    <strong>{{ task.title }}</strong>
    <span class="priority">{{ task.priority }}</span>
  </div>

  @if (task.description) {
    <p>{{ task.description }}</p>
  }

  @if (task.dueDate) {
    <p class="task-meta">Echeance: {{ task.dueDate }}</p>
  }

  <div class="task-actions">
    <select
      [value]="targetColumnId"
      (change)="targetColumnChange.emit($any($event.target).value)"
    >
      @for (column of columns; track column.id) {
        <option [value]="column.id" [selected]="targetColumnId === column.id">
          {{ column.name }}
        </option>
      }
    </select>
    <button
      type="button"
      class="secondary-button"
      (click)="taskMove.emit(task)"
      [disabled]="moving || targetColumnId === task.columnId"
    >
      {{ moving ? 'Deplacement...' : 'Deplacer' }}
    </button>
    <button
      type="button"
      class="danger-button"
      (click)="taskDelete.emit(task)"
      [disabled]="deleting"
    >
      {{ deleting ? 'Suppression...' : 'Supprimer' }}
    </button>
  </div>
</article>
